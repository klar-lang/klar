id: "002"
title: "FizzBuzz"
category: "basics"
difficulty: "easy"
prompt: |
  Write a Klar function called `fizzbuzz` that takes an `n: Int` parameter
  and returns "Fizz" if n is divisible by 3, "Buzz" if divisible by 5,
  "FizzBuzz" if divisible by both, or the number as a string otherwise.
solution: |
  fn fizzbuzz(n: Int) -> String {
      if n % 15 == 0 {
          "FizzBuzz"
      } else if n % 3 == 0 {
          "Fizz"
      } else if n % 5 == 0 {
          "Buzz"
      } else {
          "{n}"
      }
  }
test: |
  test fizzbuzz {
      assert_eq(fizzbuzz(1), "1")
      assert_eq(fizzbuzz(3), "Fizz")
      assert_eq(fizzbuzz(5), "Buzz")
      assert_eq(fizzbuzz(15), "FizzBuzz")
      assert_eq(fizzbuzz(30), "FizzBuzz")
      assert_eq(fizzbuzz(7), "7")
  }
