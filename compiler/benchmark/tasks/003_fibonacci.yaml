id: "003"
title: "Fibonacci"
category: "basics"
difficulty: "easy"
prompt: |
  Write a Klar function called `fib` that takes an `n: Int` parameter
  and returns the nth Fibonacci number. fib(0) = 0, fib(1) = 1,
  fib(n) = fib(n-1) + fib(n-2).
solution: |
  fn fib(n: Int) -> Int {
      if n <= 0 {
          0
      } else {
          let mut a = 0
          let mut b = 1
          let mut i = 2
          loop {
              if i > n { break }
              let temp = a + b
              a = b
              b = temp
              i = i + 1
          }
          b
      }
  }
test: |
  test fib {
      assert_eq(fib(0), 0)
      assert_eq(fib(1), 1)
      assert_eq(fib(2), 1)
      assert_eq(fib(5), 5)
      assert_eq(fib(10), 55)
  }
