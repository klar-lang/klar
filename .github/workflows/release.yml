name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    working-directory: compiler

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: klar-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: klar-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install LLVM 18 (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo add-apt-repository -y "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-18 main"
          sudo apt-get update
          sudo apt-get install -y llvm-18-dev libpolly-18-dev zlib1g-dev libzstd-dev
        working-directory: .

      - name: Install LLVM 18 (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm@18 zstd
        working-directory: .

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: compiler

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p klar-compiler
        env:
          RUSTFLAGS: "-C strip=symbols"
          LLVM_SYS_180_PREFIX: ${{ runner.os == 'macOS' && '/opt/homebrew/opt/llvm@18' || '/usr/lib/llvm-18' }}
          LIBRARY_PATH: ${{ runner.os == 'macOS' && '/opt/homebrew/lib' || '' }}

      - name: Package binary
        run: |
          cp target/${{ matrix.target }}/release/klar ../${{ matrix.artifact }}
          chmod +x ../${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20
        working-directory: .

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PRERELEASE=""
          if echo "$TAG" | grep -qE "alpha|beta|rc"; then
            PRERELEASE="--prerelease"
          fi
          # Delete existing release if any
          gh release delete "$TAG" --yes 2>/dev/null || true
          # Create release with binaries
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            $PRERELEASE \
            artifacts/klar-linux-x86_64/klar-linux-x86_64 \
            artifacts/klar-macos-arm64/klar-macos-arm64
        working-directory: .
